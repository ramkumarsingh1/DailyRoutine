<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="style.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

</head>

<body>
    <main>
        <h1 class="title">Daily <span>Routine</span></h1>
        <div class="app-container">
            <h2 class="subtitle">Today</h2>
            <p class="progress-label">Raise the bar by completing your goals!</p>
            <div class="progress-bar">
                <div class="progress-value">
                    <span>2/3 Completed</span>
                </div>
                <p class="error-label">Please set all the 3 goals!</p>
            </div>
            <div class="goal-container ">
                <div class="custom-checkbox check-icon"></div>
                <input class="goal-input" id="first" placeholder="Add new goal" type="text">
            </div>
            <div class="goal-container">
                <div class="custom-checkbox check-icon" ></div>
                <input class="goal-input" id="second" placeholder="Add new goal" type="text">
            </div>
            <div class="goal-container">
                <div class="custom-checkbox check-icon"></div>
                <input class="goal-input" id="third" placeholder="Add new goal" type="text">
            </div>
            <div class="goal-container">
                <div class="custom-checkbox check-icon"></div>
                <input class="goal-input" id="fourth" placeholder="Add new goal" type="text">
            </div>
            <p class="quote">"Move one step ahead today!"</p>
            <p class="made-with">Made with ❤️ by <a href="https://github.com/yourusername">Ram Kumar</a></p>
        </div>
    </main>
</body>

</html>
